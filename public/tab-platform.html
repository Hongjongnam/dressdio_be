<div class="api-grid">
  <fieldset>
    <legend>
      1. 통합 소유권 이전 (POST /api/nft/platform/transfer-all-ownership)
    </legend>
    <p>
      PlatformRegistry, SBT, IPNFTFactory, MerchandiseFactory의 소유권을 모두
      새로운 주소로 이전합니다.
    </p>
    <form id="transferAllOwnershipForm">
      <label
        >Access Token <input type="text" name="accessToken" required
      /></label>
      <label
        >장치 비밀번호 <input type="password" name="devicePassword" required
      /></label>
      <label
        >새로운 소유자 주소
        <input type="text" name="newOwner" placeholder="0x..." required
      /></label>
      <button type="submit">통합 소유권 이전</button>
    </form>
    <pre id="transferAllOwnershipResponse"></pre>
  </fieldset>
  <fieldset>
    <legend>2. 현재 소유자 조회 (GET /api/nft/platform/owner)</legend>
    <button id="get-owner-btn">Get Owner</button>
    <pre id="get-owner-result"></pre>
  </fieldset>
  <fieldset>
    <legend>
      3. PlatformRegistry 상태 조회 (GET /api/nft/platform/status)
    </legend>
    <button id="get-status-btn">Get Status</button>
    <pre id="get-status-result"></pre>
  </fieldset>
