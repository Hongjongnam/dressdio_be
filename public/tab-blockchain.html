<h2>Blockchain Utils</h2>
<div class="api-grid">
  <fieldset>
    <legend>1. Faucet (DP 토큰 받기) (POST /api/utils/faucet)</legend>
    <form id="faucet-form">
      <label
        >Wallet Address <input type="text" name="walletAddress" required
      /></label>
      <label
        >Amount (DP) <input type="text" name="amount" value="10" required
      /></label>
      <button type="submit">Get DP Tokens</button>
    </form>
    <pre id="faucet-result"></pre>
  </fieldset>
  <fieldset>
    <legend>2. IPFS 파일 업로드 (POST /api/utils/ipfs/upload-file)</legend>
    <form id="ipfs-upload-file-form">
      <label
        >File
        <input
          type="file"
          name="file"
          accept="image/*,video/*,audio/*,application/*"
          required
      /></label>
      <button type="submit">Upload File to IPFS</button>
    </form>
    <pre id="ipfs-upload-file-result"></pre>
  </fieldset>
  <fieldset>
    <legend>3. IPFS JSON 업로드 (POST /api/utils/ipfs/upload-json)</legend>
    <form id="ipfs-upload-json-form">
      <label
        >JSON Data
        <textarea
          name="jsonData"
          rows="5"
          placeholder='{"name": "example", "description": "test"}'
          required
        ></textarea>
      </label>
      <button type="submit">Upload JSON to IPFS</button>
    </form>
    <pre id="ipfs-upload-json-result"></pre>
  </fieldset>
