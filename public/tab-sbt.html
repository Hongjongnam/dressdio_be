<body>
  <div class="api-grid">
    <fieldset>
      <legend>1. SBT 발급 (관리자)</legend>
      <form id="mint-sbt-form">
        <label for="sbtAccessToken">관리자 액세스 토큰</label>
        <textarea
          id="sbtAccessToken"
          name="accessToken"
          rows="3"
          required
        ></textarea>

        <label for="sbtDevicePassword">관리자 장치 비밀번호</label>
        <input
          type="password"
          id="sbtDevicePassword"
          name="devicePassword"
          required
        />

        <label for="creatorWalletAddress">크리에이터 지갑 주소</label>
        <input
          type="text"
          id="creatorWalletAddress"
          name="creatorWalletAddress"
          required
          placeholder="0x..."
        />

        <label for="sbtCreatorType">크리에이터 타입</label>
        <select id="sbtCreatorType" name="creatorType" required>
          <option value="">선택하세요</option>
          <option value="brand">Brand</option>
          <option value="artist">Artist</option>
          <option value="influencer">Influencer</option>
        </select>

        <label for="sbtCreatorName">크리에이터 이름</label>
        <input type="text" id="sbtCreatorName" name="creatorName" required />

        <label for="sbtDescription">설명</label>
        <input type="text" id="sbtDescription" name="description" required />

        <button type="submit">SBT 발급</button>
      </form>
      <pre id="mint-sbt-result"></pre>
    </fieldset>

    <fieldset>
      <legend>2. 전체 SBT 목록 조회</legend>
      <form id="get-all-sbt-form">
        <button type="button" id="get-all-sbt-btn">전체 SBT 조회</button>
      </form>
      <pre id="get-all-sbt-result"></pre>
    </fieldset>

    <fieldset>
      <legend>3. SBT 정보 조회 (ID)</legend>
      <form id="get-sbt-info-form">
        <label for="sbtId">SBT ID</label>
        <input type="text" id="sbtId" name="sbtId" required />
        <button type="button" id="get-sbt-info-btn">SBT 정보 조회</button>
      </form>
      <pre id="get-sbt-info-result"></pre>
    </fieldset>
  </div>
</body>
